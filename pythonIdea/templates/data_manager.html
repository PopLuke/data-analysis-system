<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数据管理 - 交互式数据分析系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4 text-center">📂 数据管理模块</h2>

    <!-- 提示消息 -->
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for msg in messages %}
    <div class="alert alert-info">{{ msg }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <!-- 上传区域 -->
    <div class="card p-4 mb-4">
        <h5>📤 上传数据文件</h5>
        <form action="/upload" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <input type="file" name="file" class="form-control" accept=".csv,.xlsx,.xls" required>
            </div>
            <button type="submit" class="btn btn-primary">上传并加载</button>
        </form>
    </div>

    <!-- 操作按钮 -->
    {% if has_data %}
    <div class="mb-3">
        <span class="me-3">当前文件：{{ filename }}</span>
        <a href="/export/csv" class="btn btn-success me-2">导出 CSV</a>
        <a href="/export/excel" class="btn btn-warning me-2">导出 Excel</a>
        <a href="/clear" class="btn btn-danger">清空数据</a>
    </div>

    <!-- 数据预览 -->
    <div class="card p-3">
        <h5>📄 数据预览（前50行）</h5>
        <div class="table-responsive mt-3">
            {{ preview|safe }}
        </div>
    </div>
    {% endif %}
</div>
</body>
</html>
