{% extends "base.html" %}

{% block title %}数据上传 - 数据分析系统{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <h2 class="mb-3">数据上传</h2>
        <p class="text-muted">请选择 CSV 或 Excel 文件。后续模块会在此基础上扩展数据预览、清洗和分析功能。</p>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="file" class="form-label">数据文件</label>
                        <input class="form-control" type="file" id="file" name="file" accept=".csv,.xlsx,.xls">
                        <div class="form-text">支持 .csv、.xlsx、.xls 格式。</div>
                    </div>
                    <button type="submit" class="btn btn-primary">上传文件</button>
                    <a href="{{ url_for('index') }}" class="btn btn-outline-secondary ms-2">返回首页</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
