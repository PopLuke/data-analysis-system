{% extends "base.html" %}

{% block title %}结果导出 - 数据分析系统{% endblock %}

{% block content %}
<div class="page-header mb-4">
    <h2 class="fw-bold">结果导出</h2>
    <p class="text-muted mb-0">这里将提供清洗后数据、分析结果等文件导出功能。</p>
</div>

<div class="card shadow-sm">
    <div class="card-body p-4">
        <div class="row align-items-center">
            <div class="col-md-8">
                <h5 class="fw-semibold">导出清洗后的数据</h5>
                <p class="text-muted mb-md-0">数据管理模块接入后，可以在这里下载清洗后的 CSV 文件。</p>
            </div>
            <div class="col-md-4 text-md-end">
                <button type="button" class="btn btn-primary" disabled>下载 CSV</button>
            </div>
        </div>
    </div>
</div>

<div class="card shadow-sm mt-4">
    <div class="card-body p-4">
        <div class="row align-items-center">
            <div class="col-md-8">
                <h5 class="fw-semibold">导出分析结果</h5>
                <p class="text-muted mb-md-0">分析模块接入后，可以在这里下载聚类或回归结果。</p>
            </div>
            <div class="col-md-4 text-md-end">
                <button type="button" class="btn btn-outline-primary" disabled>下载结果</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
