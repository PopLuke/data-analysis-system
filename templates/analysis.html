{% extends "base.html" %}

{% block title %}数据分析 - 数据分析系统{% endblock %}

{% block content %}
<div class="page-header mb-4">
    <h2 class="fw-bold">数据分析</h2>
    <p class="text-muted mb-0">这里将支持 K-Means 聚类分析和线性回归预测等机器学习功能。</p>
</div>

<div class="row g-4">
    <div class="col-lg-4">
        <div class="card shadow-sm">
            <div class="card-header bg-white fw-semibold">分析配置</div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">分析方法</label>
                        <select class="form-select" name="method">
                            <option value="kmeans">K-Means 聚类</option>
                            <option value="regression">线性回归预测</option>
                            <option value="classification">分类分析</option>
                            <option value="pca">PCA 降维</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">选择数值字段（按住 Ctrl 多选）</label>
                        <select class="form-select" name="columns" multiple size="6">
                            {% for col in numeric_cols %}
                            <option value="{{ col }}">{{ col }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">目标字段</label>
                        <select class="form-select" name="target">
                            <option value="">请选择</option>
                            {% for col in numeric_cols %}
                            <option value="{{ col }}">{{ col }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">聚类数量 K</label>
                        <input type="number" class="form-control" name="k" value="3" min="2">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">特征字段（按住 Ctrl 多选）</label>
                        <select class="form-select" name="features" multiple size="6">
                            {% for col in numeric_cols %}
                            <option value="{{ col }}">{{ col }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">开始分析</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-lg-8">
        <div class="card shadow-sm h-100">
            <div class="card-header bg-white fw-semibold">分析结果</div>
            <div class="card-body table-responsive">
                {% if result %}
                    {{ result|safe }}
                {% else %}
                    <div class="empty-state text-center py-5">
                        <h5>暂无分析结果</h5>
                        <p class="text-muted mb-0">选择方法并点击开始分析后，这里会展示结果。</p>
                    </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
